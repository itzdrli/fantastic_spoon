services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fspoon-bot
    restart: unless-stopped
    command: ["bun", "run", "dev"]
    environment:
      - NODE_ENV=development
      - BOT_TOKEN=${BOT_TOKEN}
      - REVIEW_GROUP_ID=${REVIEW_GROUP_ID}
      - ADMIN_IDS=${ADMIN_IDS}
      - KMEME_USERNAME=${KMEME_USERNAME}
      - KMEME_PASSWORD=${KMEME_PASSWORD}
      - VALKEY_HOST=valkey
      - VALKEY_PORT=6379
    volumes:
      - ./logs:/app/logs
      - ./src:/app/src
      - ./fonts:/app/fonts
    env_file:
      - .env
    depends_on:
      - valkey
    dns:
      - 8.8.8.8
      - 9.9.9.9

  valkey:
    image: valkey/valkey:latest
    container_name: fspoon-valkey
    restart: unless-stopped
    volumes:
      - valkey_data:/data

volumes:
  valkey_data:
